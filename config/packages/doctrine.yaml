doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        server_version: '18'
        options:
            timezone: '%env(APP_TZ)%'
        profiling_collect_backtrace: '%kernel.debug%'
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Auth/Infrastructure/Doctrine/Entity'
                prefix: 'App\Auth\Infrastructure\Doctrine\Entity'
                alias: Auth
            Embeddable:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Shared/Infrastructure/Doctrine/Embeddable'
                prefix: 'App\Shared\Infrastructure\Doctrine\Embeddable'
                alias: Embeddable
            Gym:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Gym/Infrastructure/Doctrine/Entity'
                prefix: 'App\Gym\Infrastructure\Doctrine\Entity'
                alias: Gym
            Owner:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Owner/Infrastructure/Doctrine/Entity'
                prefix: 'App\Owner\Infrastructure\Doctrine\Entity'
                alias: Owner
            Subscription:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Subscription/Domain'
                prefix: 'App\Subscription\Domain'
                alias: Subscription
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
