name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.1-alpine
        env:
          POSTGRES_DB: gym
          POSTGRES_USER: gym_user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gym_user -d gym"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://gym_user:password@127.0.0.1:5432/gym?serverVersion=18&charset=utf8
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: 2b404cca8fa57fe3e0c5a60677338f2883911d97ff60e78b6ec2b945657402ef
      JWT_TOKEN_TTL: 900
      JWT_REFRESH_TOKEN_TTL: 2592000

    strategy:
      fail-fast: false
      matrix:
        php: ['8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ctype, iconv, pdo_pgsql
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Prepare test database
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: ctype, iconv
          coverage: none

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            .tools/vendor
          key: ${{ runner.os }}-tools-${{ hashFiles('.tools/composer.lock') }}
          restore-keys: ${{ runner.os }}-tools-

      - name: Install project dependencies
        run: composer install --prefer-dist --no-progress

      - name: Install PHPStan
        working-directory: .tools
        run: composer install --prefer-dist --no-progress

      - name: Run PHPStan
        run: .tools/vendor/bin/phpstan analyse -l 6 src tests --no-progress

  deptrac:
    name: Deptrac
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: ctype, iconv
          coverage: none

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            .tools/vendor
          key: ${{ runner.os }}-tools-${{ hashFiles('.tools/composer.lock') }}
          restore-keys: ${{ runner.os }}-tools-

      - name: Install project dependencies
        run: composer install --prefer-dist --no-progress

      - name: Install tools
        working-directory: .tools
        run: composer install --prefer-dist --no-progress

      - name: Run Deptrac
        run: .tools/vendor/bin/deptrac analyse --no-progress

  cs-fixer:
    name: PHP CS Fixer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            .tools/vendor
          key: ${{ runner.os }}-tools-${{ hashFiles('.tools/composer.lock') }}
          restore-keys: ${{ runner.os }}-tools-

      - name: Install PHP CS Fixer
        working-directory: .tools
        run: composer install --prefer-dist --no-progress

      - name: Run PHP CS Fixer
        run: .tools/vendor/bin/php-cs-fixer fix --dry-run --diff --verbose --allow-risky=yes
