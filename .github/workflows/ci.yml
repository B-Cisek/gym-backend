name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ctype, iconv, pdo_sqlite
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run tests
        run: vendor/bin/phpunit

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: ctype, iconv
          coverage: none

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            .tools/vendor
          key: ${{ runner.os }}-tools-${{ hashFiles('.tools/composer.lock') }}
          restore-keys: ${{ runner.os }}-tools-

      - name: Install project dependencies
        run: composer install --prefer-dist --no-progress

      - name: Install PHPStan
        working-directory: .tools
        run: composer install --prefer-dist --no-progress

      - name: Run PHPStan
        run: .tools/vendor/bin/phpstan analyse -l 6 src tests --no-progress

  cs-fixer:
    name: PHP CS Fixer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            .tools/vendor
          key: ${{ runner.os }}-tools-${{ hashFiles('.tools/composer.lock') }}
          restore-keys: ${{ runner.os }}-tools-

      - name: Install PHP CS Fixer
        working-directory: .tools
        run: composer install --prefer-dist --no-progress

      - name: Run PHP CS Fixer
        run: .tools/vendor/bin/php-cs-fixer fix --dry-run --diff --verbose --allow-risky=yes
